<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>세포 관찰 수행평가</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<style>
:root{
  --bg:#f5f3ef;--surface:#fff;--s2:#f0ede8;--border:#e0dbd3;
  --text:#1a1814;--t2:#6b6560;--t3:#9e9890;
  --acc:#2d5a3d;--acc-l:#e8f0ea;
  --blue:#2c4a7c;--blue-l:#e8edf5;
  --red:#8b2020;--red-l:#f5e8e8;
  --green:#1e5c35;--green-l:#e6f2eb;
  --amber:#7a4f00;--amber-l:#fdf3e0;
  --r:12px;--rs:8px;
  --sh:0 1px 3px rgba(0,0,0,.06),0 4px 16px rgba(0,0,0,.04);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:15px;line-height:1.6}

/* ── LOGIN ── */
#loginScreen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.login-card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:48px 36px;width:100%;max-width:420px;box-shadow:var(--sh);text-align:center}
.login-icon{width:64px;height:64px;background:var(--acc-l);border-radius:16px;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;font-size:28px}
.login-title{font-size:22px;font-weight:700;margin-bottom:6px}
.login-sub{font-size:13px;color:var(--t2);margin-bottom:32px;line-height:1.7}
.login-btns{display:flex;flex-direction:column;gap:10px}
.lbtn{padding:14px 20px;border-radius:var(--rs);border:1.5px solid var(--border);font-size:15px;font-weight:500;font-family:'Noto Sans KR',sans-serif;cursor:pointer;display:flex;align-items:center;gap:10px;transition:all .15s}
.lbtn.student{background:var(--acc);color:#fff;border-color:var(--acc)}
.lbtn.student:hover{background:#234a31}
.lbtn.teacher{background:var(--surface);color:var(--text)}
.lbtn.teacher:hover{background:var(--s2)}

/* ── PIN OVERLAY ── */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;align-items:center;justify-content:center;padding:24px}
.overlay.show{display:flex}
.pin-card{background:var(--surface);border-radius:20px;padding:36px 32px;width:100%;max-width:360px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.15)}
.pin-title{font-size:18px;font-weight:700;margin-bottom:6px}
.pin-sub{font-size:13px;color:var(--t2);margin-bottom:22px}
.pin-err{font-size:12px;color:var(--red);margin-bottom:10px;display:none}
.pin-input{width:100%;padding:11px 14px;font-size:16px;font-family:'DM Mono',monospace;text-align:center;border:1.5px solid var(--border);border-radius:var(--rs);background:var(--s2);color:var(--text);letter-spacing:2px;margin-bottom:14px}
.pin-input:focus{outline:none;border-color:var(--acc)}
.pin-btn{width:100%;padding:12px;background:var(--blue);color:#fff;border:none;border-radius:var(--rs);font-size:15px;font-weight:500;font-family:'Noto Sans KR',sans-serif;cursor:pointer;margin-bottom:8px}
.pin-cancel{width:100%;padding:8px;background:none;border:none;color:var(--t2);font-size:13px;cursor:pointer;font-family:'Noto Sans KR',sans-serif}

/* ── APP SHELL ── */
#appShell{display:none;min-height:100vh}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 20px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.topbar-left{display:flex;align-items:center;gap:10px}
.topbar-logo{font-size:14px;font-weight:700;color:var(--acc)}
.mode-tag{font-size:11px;font-weight:500;padding:3px 10px;border-radius:20px}
.mode-tag.student{background:var(--acc-l);color:var(--acc)}
.mode-tag.teacher{background:var(--blue-l);color:var(--blue)}
.topbar-right button{background:none;border:1px solid var(--border);border-radius:var(--rs);padding:6px 14px;font-size:13px;color:var(--t2);cursor:pointer;font-family:'Noto Sans KR',sans-serif}
.content{padding:20px 16px 60px;max-width:700px;margin:0 auto}

/* ── PROGRESS ── */
.prog-wrap{margin-bottom:20px}
.prog-steps{display:flex;gap:6px;margin-bottom:6px}
.step-dot{flex:1;height:4px;border-radius:2px;background:var(--border);transition:background .3s}
.step-dot.active{background:var(--acc)}
.step-dot.done{background:var(--acc);opacity:.4}
.prog-label{font-size:12px;color:var(--t3)}

/* ── CARDS ── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:20px;margin-bottom:14px;box-shadow:var(--sh)}
.sec-tag{display:inline-block;font-size:10px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--t3);margin-bottom:12px}
.form-label{font-size:13px;color:var(--t2);margin-bottom:6px;display:block;font-weight:500}
.form-input,.form-select{width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:var(--rs);font-size:14px;font-family:'Noto Sans KR',sans-serif;background:var(--s2);color:var(--text);transition:border-color .15s}
.form-input:focus,.form-select:focus{outline:none;border-color:var(--acc);background:var(--surface)}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-group{margin-bottom:12px}

/* ── PHOTO GRID ── */
.photo-note{font-size:12px;padding:8px 12px;background:var(--amber-l);border-radius:var(--rs);color:var(--amber);margin-bottom:12px}
.photo-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.photo-slot{aspect-ratio:1;border:1.5px dashed var(--border);border-radius:var(--rs);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;position:relative;overflow:hidden;transition:all .15s;background:var(--s2)}
.photo-slot:hover{border-color:var(--acc);background:var(--acc-l)}
.photo-slot input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.photo-slot-icon{font-size:22px;margin-bottom:4px}
.photo-slot-lbl{font-size:11px;color:var(--t3)}
.photo-slot img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;border-radius:calc(var(--rs) - 2px)}
.photo-slot .del-btn{display:none;position:absolute;top:4px;right:4px;width:22px;height:22px;background:rgba(0,0,0,.65);border:none;border-radius:50%;color:#fff;font-size:12px;cursor:pointer;align-items:center;justify-content:center;z-index:2}
.photo-slot:hover .del-btn{display:flex}
.photo-count{font-size:12px;color:var(--t3);margin-top:8px}

/* ── QUESTIONS ── */
.q-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:18px 20px;margin-bottom:12px;box-shadow:var(--sh)}
.q-head{display:flex;align-items:flex-start;gap:10px;margin-bottom:6px}
.q-num{display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;background:var(--acc);color:#fff;font-size:11px;font-weight:700;border-radius:6px;flex-shrink:0;margin-top:1px}
.q-num.sub{background:var(--blue);width:20px;height:20px;font-size:10px;border-radius:4px}
.q-text{font-size:14px;font-weight:500;color:var(--text);line-height:1.6;flex:1}
.q-tag{font-size:10px;color:var(--t3);margin-bottom:10px;font-weight:500;letter-spacing:.3px;margin-left:34px}
.q-score{font-size:10px;color:var(--blue);background:var(--blue-l);padding:2px 8px;border-radius:10px;margin-left:6px;font-weight:500}

/* OX */
.ox-list{display:flex;flex-direction:column;gap:9px}
.ox-row{background:var(--s2);border:1px solid var(--border);border-radius:var(--rs);padding:12px 14px}
.ox-stmt{font-size:14px;color:var(--text);margin-bottom:10px;line-height:1.6}
.ox-btns{display:flex;gap:8px}
.ox-btn{flex:1;padding:8px;border-radius:var(--rs);border:1.5px solid var(--border);font-size:16px;font-weight:700;font-family:'Noto Sans KR',sans-serif;cursor:pointer;transition:all .12s;background:var(--surface)}
.ox-btn:hover{border-color:var(--acc)}
.ox-btn.selO{border-color:var(--green);background:var(--green-l);color:var(--green)}
.ox-btn.selX{border-color:var(--red);background:var(--red-l);color:var(--red)}

/* OPTS */
.opt-list{display:flex;flex-direction:column;gap:7px}
.opt-item{display:flex;align-items:center;gap:10px;padding:11px 14px;border:1px solid var(--border);border-radius:var(--rs);cursor:pointer;transition:all .12s;font-size:14px;color:var(--text);background:var(--s2);user-select:none}
.opt-item:hover{border-color:var(--acc);background:var(--acc-l)}
.opt-item.sel{border-color:var(--acc);background:var(--acc-l);color:var(--acc);font-weight:500}
.opt-item.sel .odot{background:var(--acc);border-color:var(--acc)}
.opt-item.sel .odot::after{display:block}
.odot{width:18px;height:18px;border-radius:50%;border:1.5px solid var(--border);flex-shrink:0;position:relative;transition:all .12s}
.odot::after{content:'';display:none;width:8px;height:8px;background:#fff;border-radius:50%;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%)}

/* DIAGRAM */
.diag-wrap{overflow-x:auto;padding:4px 0 8px}
.diag{display:flex;align-items:center;gap:4px;min-width:fit-content}
.d-cell{background:var(--blue-l);color:var(--blue);border:1px solid var(--blue);border-radius:6px;padding:6px 12px;font-size:13px;font-weight:500;white-space:nowrap}
.d-arr{color:var(--t3);font-size:16px;flex-shrink:0}
.d-inp{padding:6px 8px;font-size:13px;font-family:'Noto Sans KR',sans-serif;border:1.5px solid var(--acc);border-radius:6px;background:var(--acc-l);color:var(--text);width:76px;text-align:center}
.d-inp:focus{outline:none;border-color:var(--blue)}

/* TEXTAREA / INPUT */
.txt-input{width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:var(--rs);font-size:14px;font-family:'Noto Sans KR',sans-serif;background:var(--s2);color:var(--text);resize:vertical}
.txt-input:focus{outline:none;border-color:var(--acc);background:var(--surface)}
.sub-q{margin-top:14px;padding-top:14px;border-top:1px solid var(--border)}

/* BUTTONS */
.btn-row{display:flex;gap:10px;justify-content:flex-end;margin-top:20px}
.btn{padding:12px 24px;border-radius:var(--rs);font-size:14px;font-weight:500;font-family:'Noto Sans KR',sans-serif;cursor:pointer;border:1px solid var(--border);background:var(--surface);color:var(--text);transition:all .12s}
.btn:hover{background:var(--s2)}
.btn.primary{background:var(--acc);color:#fff;border-color:var(--acc)}
.btn.primary:hover{background:#234a31}
.btn.blue{background:var(--blue);color:#fff;border-color:var(--blue)}
.btn.blue:hover{background:#1e3560}
.btn:disabled{opacity:.5;cursor:not-allowed}

/* DONE */
.done-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:44px 24px;text-align:center;box-shadow:var(--sh)}
.done-icon{font-size:52px;margin-bottom:16px}
.done-title{font-size:20px;font-weight:700;margin-bottom:8px}
.done-sub{font-size:14px;color:var(--t2);line-height:1.8}

/* ── TEACHER ── */
.t-header{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:20px;margin-bottom:16px;box-shadow:var(--sh)}
.t-header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:10px}
.t-title{font-size:18px;font-weight:700}
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.stat-card{background:var(--s2);border-radius:var(--rs);padding:10px 12px;text-align:center}
.stat-num{font-size:20px;font-weight:700;font-family:'DM Mono',monospace}
.stat-lbl{font-size:11px;color:var(--t3);margin-top:1px}

.filter-bar{display:flex;gap:7px;margin-bottom:14px;flex-wrap:wrap}
.filter-btn{padding:6px 14px;border-radius:20px;border:1px solid var(--border);font-size:12px;font-weight:500;cursor:pointer;font-family:'Noto Sans KR',sans-serif;background:var(--surface);color:var(--t2);transition:all .12s}
.filter-btn.active{background:var(--blue);color:#fff;border-color:var(--blue)}

.stu-list{display:flex;flex-direction:column;gap:10px}
.stu-row{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:15px 18px;box-shadow:var(--sh);cursor:pointer;transition:border-color .12s}
.stu-row:hover{border-color:var(--acc)}
.stu-row-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.stu-name{font-size:15px;font-weight:700}
.stu-cls{font-size:12px;color:var(--t3)}
.sc-badge{font-size:13px;font-weight:700;font-family:'DM Mono',monospace;padding:4px 12px;border-radius:20px}
.sc-badge.hi{background:var(--green-l);color:var(--green)}
.sc-badge.mi{background:var(--amber-l);color:var(--amber)}
.sc-badge.lo{background:var(--red-l);color:var(--red)}
.sc-badge.pending{background:var(--s2);color:var(--t2)}
.stu-meta{display:flex;gap:7px;flex-wrap:wrap}
.meta-tag{font-size:11px;color:var(--t3);background:var(--s2);padding:3px 8px;border-radius:4px}

.empty-state{text-align:center;padding:60px 20px}
.empty-icon{font-size:40px;margin-bottom:12px}
.empty-txt{font-size:14px;color:var(--t3)}

/* ── DETAIL MODAL ── */
.det-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:flex-start;justify-content:center;padding:16px;overflow-y:auto}
.det-ov.show{display:flex}
.det-card{background:var(--surface);border-radius:20px;width:100%;max-width:660px;margin:auto;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.det-head{background:var(--blue);color:#fff;padding:22px 24px;display:flex;align-items:flex-start;justify-content:space-between;position:relative}
.det-name{font-size:19px;font-weight:700;margin-bottom:3px}
.det-info{font-size:12px;opacity:.75}
.det-score{font-size:36px;font-weight:700;font-family:'DM Mono',monospace}
.det-score-lbl{font-size:11px;opacity:.7;text-align:right}
.det-close{position:absolute;top:12px;right:12px;background:rgba(255,255,255,.2);border:none;color:#fff;width:28px;height:28px;border-radius:50%;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.det-body{padding:20px;max-height:72vh;overflow-y:auto}
.det-sec{margin-bottom:20px}
.det-sec-title{font-size:11px;font-weight:700;letter-spacing:.7px;text-transform:uppercase;color:var(--t3);margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--border)}

.photo-thumb-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:10px}
.photo-thumb{width:100%;aspect-ratio:1;object-fit:cover;border-radius:var(--rs);background:var(--s2)}

.score-row{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:var(--s2);border-radius:var(--rs);margin-top:8px;gap:12px;flex-wrap:wrap}
.score-row-lbl{font-size:13px;font-weight:500;color:var(--text)}
.score-row-note{font-size:11px;color:var(--t3)}
.score-inp{width:64px;padding:5px 8px;border:1.5px solid var(--border);border-radius:6px;font-size:14px;font-family:'DM Mono',monospace;text-align:center;background:var(--surface);color:var(--text)}
.score-inp:focus{outline:none;border-color:var(--acc)}
.save-btn{padding:6px 14px;background:var(--acc);color:#fff;border:none;border-radius:var(--rs);font-size:13px;font-weight:500;font-family:'Noto Sans KR',sans-serif;cursor:pointer}

.sc-chips{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.chip{padding:4px 12px;border-radius:20px;font-size:12px;font-weight:500}
.chip.photo{background:var(--amber-l);color:var(--amber)}
.chip.q{background:var(--blue-l);color:var(--blue)}
.chip.total{background:var(--green-l);color:var(--green);font-weight:700}

.qa-item{padding:10px 0;border-bottom:1px solid var(--border)}
.qa-item:last-child{border-bottom:none}
.qa-q{font-size:12px;color:var(--t2);margin-bottom:5px;line-height:1.5}
.qa-a{font-size:14px;font-weight:500;display:flex;align-items:flex-start;gap:8px;line-height:1.5;flex-wrap:wrap}
.ok{color:var(--green)}
.ng{color:var(--red)}
.essay-box{background:var(--s2);border-radius:var(--rs);padding:9px 12px;font-size:13px;line-height:1.7;width:100%;margin-top:6px;color:var(--text)}

.det-actions{display:flex;gap:10px;padding:14px 20px;border-top:1px solid var(--border)}
.btn.danger{background:var(--red-l);color:var(--red);border-color:var(--red-l)}
.btn.danger:hover{background:#f0d0d0;border-color:var(--red)}

/* ── SYNC STATUS ── */
.sync-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:5px}
.sync-dot.on{background:#1e5c35}
.sync-dot.off{background:#8b2020}
.sync-dot.ing{background:var(--amber);animation:pulse .8s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* ── NOTIF ── */
.notif{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--text);color:#fff;padding:12px 20px;border-radius:var(--r);font-size:13px;font-weight:500;z-index:999;transition:transform .3s cubic-bezier(.34,1.56,.64,1);white-space:nowrap;max-width:90vw;text-align:center}
.notif.show{transform:translateX(-50%) translateY(0)}

@media print{
  .topbar,.det-ov,.overlay,#loginScreen,.btn-row,.filter-bar,.det-actions,.notif{display:none!important}
  .content{padding:0;max-width:none}
  .stu-row{break-inside:avoid}
}
</style>
</head>
<body>

<div class="notif" id="notif"></div>

<!-- ── LOGIN ── -->
<div id="loginScreen">
  <div class="login-card">
    <div class="login-icon">🔬</div>
    <div class="login-title">세포 관찰 수행평가</div>
    <div class="login-sub">중학교 1학년 과학 · 세포의 구조와 생물의 구성<br>역할을 선택해 주세요</div>
    <div class="login-btns">
      <button class="lbtn student" onclick="enterStudent()"><span style="font-size:18px">👨‍🎓</span> 학생으로 시작하기</button>
      <button class="lbtn teacher" onclick="showPin()"><span style="font-size:18px">👩‍🏫</span> 교사 대시보드</button>
    </div>
  </div>
</div>

<!-- ── PIN ── -->
<div class="overlay" id="pinOv">
  <div class="pin-card">
    <div class="pin-title">🔒 교사 인증</div>
    <div class="pin-sub">교사용 비밀번호를 입력해 주세요</div>
    <div class="pin-err" id="pinErr">비밀번호가 올바르지 않습니다</div>
    <input type="password" class="pin-input" id="pinInput" maxlength="20" placeholder="비밀번호 입력" onkeydown="if(event.key==='Enter')checkPin()">
    <button class="pin-btn" onclick="checkPin()">확인</button>
    <button class="pin-cancel" onclick="hidePin()">취소</button>
  </div>
</div>

<!-- ── APP ── -->
<div id="appShell">
  <div class="topbar">
    <div class="topbar-left">
      <span class="topbar-logo">🔬 세포관찰</span>
      <span class="mode-tag" id="modeTag">학생</span>
      <span id="syncStatus" style="font-size:11px;color:var(--t2);display:none">
        <span class="sync-dot" id="syncDot"></span><span id="syncTxt"></span>
      </span>
    </div>
    <div class="topbar-right"><button onclick="goHome()">나가기</button></div>
  </div>
  <div class="content" id="mainContent"></div>
</div>

<!-- ── DETAIL MODAL ── -->
<div class="det-ov" id="detOv">
  <div class="det-card">
    <div class="det-head">
      <div>
        <div class="det-name" id="dName"></div>
        <div class="det-info" id="dInfo"></div>
      </div>
      <div style="text-align:right">
        <div class="det-score" id="dScore"></div>
        <div class="det-score-lbl">/ 40점</div>
      </div>
      <button class="det-close" onclick="closeDet()">✕</button>
    </div>
    <div class="det-body" id="detBody"></div>
    <div class="det-actions">
      <button class="btn danger" onclick="deleteSub(currentDetId)">🗑 삭제</button>
      <button class="btn" onclick="printStudent(currentDetId)">🖨 프린트</button>

// 사진을 canvas로 압축 (Realtime DB 저장용 - 800px, quality 0.5 → 약 50~80KB)
function compressPhoto(base64, maxPx=800, quality=0.5){
  return new Promise(resolve=>{
    const img=new Image();
    img.onload=()=>{
      const canvas=document.createElement('canvas');
      let w=img.width, h=img.height;
      if(w>h){ if(w>maxPx){h=Math.round(h*maxPx/w);w=maxPx;} }
      else { if(h>maxPx){w=Math.round(w*maxPx/h);h=maxPx;} }
      canvas.width=w; canvas.height=h;
      canvas.getContext('2d').drawImage(img,0,0,w,h);
      resolve(canvas.toDataURL('image/jpeg',quality));
    };
    img.onerror=()=>resolve(base64); // 실패 시 원본
    img.src=base64;
  });
}

async function submitAll(){
  if(Object.values(sd.ox).some(v=>v===null)){showNotif('1번 문항을 모두 선택해 주세요');return;}

  if(btn){btn.disabled=true;btn.textContent='저장 중...';}

  // 사진 압축 (최대 800px, JPEG 0.5)

  const compressed=[];
  for(let i=0;i<rawPhotos.length;i++){
    setSyncStatus('ing',`사진 압축 중 (${i+1}/${rawPhotos.length})`);
    const c=await compressPhoto(rawPhotos[i]);

  setSyncStatus('ing','답안 저장 중...');
  const autoScore=calcAutoOnly(sd);

  // 사진을 photo1~photo6 키로 분리 저장 (DB 노드 크기 제한 대응)
  const photoFields={};
  compressed.forEach((c,i)=>{ photoFields[`photo${i+1}`]=c; });

  const sub={
    name:sd.name, cls:sd.cls,
    submittedAt:new Date().toLocaleString('ko-KR'),
    photoCnt:compressed.length,
    ...photoFields,
    ox:{...sd.ox},
    q2a:sd.q2a, q2b:sd.q2b, q2c:sd.q2c, q2d:sd.q2d,
    q3a:sd.q3a, q3b:sd.q3b, q3c:sd.q3c,
    autoScore,
    photoScore:null,
    subScore_q2d:null,
    subScore_q3b:null,
    subScore_q3c:null
  };

  try{
    await subsRef.push(sub);
    setSyncStatus('on','저장됨');
    step=3; render();
  }catch(err){
    setSyncStatus('off','저장 실패');

    if(btn){btn.disabled=false;btn.textContent='제출하기 ✓';}

}

  const total=subs.length;
  const scored=subs.filter(s=>isFullyScored(s));
  const avg=scored.length?Math.round(scored.reduce((a,s)=>a+grandTotal(s),0)/scored.length):'-';
  const hi=subs.filter(s=>isFullyScored(s)&&grandTotal(s)>=32).length;
  const pending=subs.filter(s=>!isFullyScored(s)).length;

  let filtered=subs;
  if(tFilter==='unscored') filtered=subs.filter(s=>!isFullyScored(s));
  else if(tFilter==='hi') filtered=subs.filter(s=>isFullyScored(s)&&grandTotal(s)>=32);
  else if(tFilter==='mi') filtered=subs.filter(s=>isFullyScored(s)&&grandTotal(s)>=20&&grandTotal(s)<32);
  else if(tFilter==='lo') filtered=subs.filter(s=>isFullyScored(s)&&grandTotal(s)<20);

async function saveScore(key, type){
  const idMap={photo:'psInput',q2d:'sub2dInput',q3b:'sub3bInput',q3c:'sub3cInput'};
  const maxMap={photo:10,q2d:4,q3b:4,q3c:2};
  const fieldMap={photo:'photoScore',q2d:'subScore_q2d',q3b:'subScore_q3b',q3c:'subScore_q3c'};
  const val=parseInt(document.getElementById(idMap[type]).value);
  if(isNaN(val)||val<0||val>maxMap[type]){showNotif(`0~${maxMap[type]} 사이 숫자를 입력해 주세요`);return;}
  try{
    await subsRef.child(key).update({[fieldMap[type]]:val});
    showNotif('저장 완료');
    // 로컬 갱신
    const idx=subs.findIndex(x=>x._key===key);
    if(idx>=0){subs[idx][fieldMap[type]]=val;}
    const s=subs.find(x=>x._key===key);
    if(s){document.getElementById('dScore').textContent=grandTotal(s);}
  }catch(err){showNotif('저장 실패: '+err.message,4000);}
}

function closeDet(){document.getElementById('detOv').classList.remove('show');}

async function deleteSub(key){
  const s=subs.find(x=>x._key===key);
  if(!s) return;
  if(!confirm(`${s.name} (${s.cls}) 학생의 답안을 삭제할까요?\n이 작업은 되돌릴 수 없습니다.`)) return;
  try{
    await subsRef.child(key).remove();
    closeDet();
    showNotif(`${s.name} 학생 답안이 삭제되었습니다`);
  }catch(err){
    showNotif('삭제 실패: '+err.message, 4000);
  }
}

function viewBig(key,idx){
  const s=subs.find(x=>x._key===key);
  if(!s) return;
  const imgs=[];
  for(let i=1;i<=6;i++){if(s[`photo${i}`])imgs.push(s[`photo${i}`]);}
  const src=imgs[idx]; if(!src) return;
  const ov=document.createElement('div');
  ov.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:999;display:flex;align-items:center;justify-content:center;cursor:zoom-out';
  ov.onclick=()=>document.body.removeChild(ov);
  const img=document.createElement('img');
  img.src=src;
  img.style.cssText='max-width:92vw;max-height:88vh;object-fit:contain;border-radius:8px';
  ov.appendChild(img);
  document.body.appendChild(ov);
}

  <div style="font-size:10px;color:#555;margin-bottom:2px">Q3-나 · 식물 전용 구조물 · 교사 채점: <strong>${q3b!=null?q3b:'미채점'}/4점</strong></div>
  <div style="background:#f7f5f0;border:1px solid #ddd;border-radius:4px;padding:5px 8px;font-size:10px;line-height:1.5;min-height:22px;margin-bottom:4px">${s.q3b||'(미입력)'}</div>
  <div style="font-size:10px;color:#555;margin-bottom:2px">Q3-다 · 핵의 역할 서답형 · 교사 채점: <strong>${q3c!=null?q3c:'미채점'}/2점</strong></div>
  <div style="background:#f7f5f0;border:1px solid #ddd;border-radius:4px;padding:5px 8px;font-size:10px;line-height:1.5;min-height:22px;margin-bottom:10px">${s.q3c||'(미작성)'}</div>
  <div style="margin-top:10px;padding-top:10px;border-top:2px solid #1a1814;display:flex;justify-content:space-between;align-items:flex-end">
    <div style="text-align:center;width:140px"><div style="font-size:10px;color:#666;margin-bottom:28px">학생 서명</div><div style="border-top:1px solid #1a1814;padding-top:3px;font-size:10px;color:#888">${s.name} (서명)</div></div>
    <div style="text-align:center;width:140px"><div style="font-size:10px;color:#666;margin-bottom:28px">교사 확인</div><div style="border-top:1px solid #1a1814;padding-top:3px;font-size:10px;color:#888">담당 교사 (서명)</div></div>
    <div style="text-align:right"><div style="font-size:10px;color:#666;margin-bottom:4px">최종 점수</div><div style="font-size:24px;font-weight:700;color:#2c4a7c">${gt}<span style="font-size:12px;font-weight:400"> / 40점</span></div></div>
  </div>
</div>`;
}

function doPrint(bodyHtml){
  const iframe=document.createElement('iframe');
  iframe.style.cssText='position:fixed;top:-9999px;left:-9999px;width:1px;height:1px;border:none;opacity:0';
  document.body.appendChild(iframe);
  const doc=iframe.contentDocument||iframe.contentWindow.document;
  doc.open();
  doc.write(`<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
      *{box-sizing:border-box}
      body{margin:0;padding:0;font-family:'Noto Sans KR',sans-serif}
      @page{size:A4 portrait;margin:8mm 10mm}
      @media print{
        html,body{width:210mm;height:297mm}
        .print-page,div[style*="page-break-after"]{page-break-after:always;width:100%}
      }
    </style>
    </head><body>${bodyHtml}</body></html>`);
  doc.close();
  iframe.onload=()=>{
    setTimeout(()=>{
      try{iframe.contentWindow.focus();iframe.contentWindow.print();}catch(e){window.print();}
      setTimeout(()=>{try{document.body.removeChild(iframe);}catch(e){}},1500);
    },500);
  };
}

function printStudent(key){
  const s=subs.find(x=>x._key===key);
  if(!s){showNotif('학생 정보를 찾을 수 없습니다');return;}
  doPrint(buildPrintHTML(s));
}

function printAll(){
  if(!subs.length){showNotif('제출된 답안이 없습니다');return;}
  doPrint(subs.map(s=>buildPrintHTML(s)).join(''));
}
</script>
